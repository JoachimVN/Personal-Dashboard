name: Update screenshots

"on":
  pull_request:
    paths:
      - 'client/src/**'
      - 'shared/src/schemas/**'
      - 'server/src/importance/**'
      - 'server/src/health/**'
      - 'server/scripts/screenshotFixtures.ts'
      - 'server/scripts/screenshots.ts'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx --prefix server playwright install --with-deps chromium

      - name: Generate screenshots
        run: npm run screenshots -w server

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/
          if git diff --cached --quiet; then
            echo "No screenshot changes"
            exit 0
          fi
          git commit -m "chore: update screenshots"
          BRANCH="${{ github.head_ref || github.ref_name }}"
          for i in 1 2 3 4 5; do
            git push origin HEAD:"$BRANCH" && exit 0
            echo "Push rejected, rebasing (attempt $i)..."
            git pull --rebase origin "$BRANCH"
          done
          echo "Failed to push after 5 attempts" >&2
          exit 1
